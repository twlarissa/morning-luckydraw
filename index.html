        actions: ['閉上眼，想像自己被金色的光芒包圍', '今天對三個陌生人（店員、路人）微笑', '進到一個新空間時，在心裡說「我把好運帶來了」'],
        icon: <IconSun className="w-6 h-6 text-yellow-500" />
      },
      {
        id: 59,
        category: '人生智慧系',
        text: '人生沒有白走的路，每一步都算數。那些彎路，讓你看到了別人沒看過的風景。',
        background: 'https://images.unsplash.com/photo-1465311440653-ba9b1d9b0f5b?auto=format&fit=crop&q=80&w=2000',
        actions: ['把過去一個「錯誤」的決定，重新定義為「探索」', '今天搭車或走路時，不看手機，純粹看窗外風景', '把現在的困難寫成一首短詩或一句話'],
        icon: <IconStar className="w-6 h-6 text-teal-600" />
      },
      {
        id: 60,
        category: '女孩自愛系',
        text: '你是宇宙間最獨特的花火，用力綻放吧，不必向任何人道歉。',
        background: 'https://images.unsplash.com/photo-1498931299472-f7a63a5a1cfa?auto=format&fit=crop&q=80&w=2000',
        actions: ['穿戴一個平常不敢穿，但非常亮眼的單品', '在社群上發布一張自己很喜歡，但不一定要完美的照片', '大聲對自己說：「我就是這麼特別！」'],
        icon: <IconHeart className="w-6 h-6 text-pink-500" />
      }
    ];

    function App() {
      const [currentQuote, setCurrentQuote] = useState(null);
      const [isDrawing, setIsDrawing] = useState(false);
      const [time, setTime] = useState(new Date());
      // --- 新增：記憶魔法！記住最近抽過的籤 ---
      const [recentIds, setRecentIds] = useState([]);

      const defaultBackground = 'https://images.unsplash.com/photo-1534447677768-be436bb09401?auto=format&fit=crop&q=80&w=2000';
      const backgroundUrl = currentQuote ? currentQuote.background : defaultBackground;

      useEffect(() => {
        const timer = setInterval(() => {
          setTime(new Date());
        }, 1000);
        return () => clearInterval(timer);
      }, []);

      const formatDate = (date) => {
        const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
        return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日 ${days[date.getDay()]}`;
      };

      const formatTime = (date) => {
        return date.toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
      };

      const handleDraw = () => {
        if (isDrawing) return;
        setIsDrawing(true);
        setCurrentQuote(null);
        
        setTimeout(() => {
          let nextQuote;
          let randomIndex;
          let attempts = 0;
          
          // --- 新增防呆邏輯：如果抽出的籤在最近 30 次的記憶中，就重新抽！ ---
          // 加上 attempts 避免極端情況下死迴圈
          do {
            randomIndex = Math.floor(Math.random() * quotesData.length);
            nextQuote = quotesData[randomIndex];
            attempts++;
          } while (recentIds.includes(nextQuote.id) && attempts < 50);
          
          setCurrentQuote(nextQuote);
          
          // 更新記憶魔法：把這次抽到的 ID 放進大腦，並保持只記得最近的 30 個
          setRecentIds(prev => {
            const newHistory = [nextQuote.id, ...prev];
            return newHistory.slice(0, 30); 
          });

          setIsDrawing(false);
        }, 1200);
      };

      return (
        <div 
          className="min-h-screen bg-cover bg-center transition-all duration-1000 ease-in-out font-sans flex flex-col relative"
          style={{ backgroundImage: `url(${backgroundUrl})` }}
        >
          <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-[2px]"></div>

          <header className="relative z-10 w-full p-6 flex flex-col items-center justify-center text-white/90">
            <div className="flex items-center space-x-2 text-sm md:text-base font-light tracking-wider mb-2">
              <IconCalendar className="w-4 h-4 opacity-80" />
              <span>{formatDate(time)}</span>
            </div>
            <div className="flex items-center space-x-3 text-4xl md:text-5xl font-semibold tracking-widest drop-shadow-lg">
              <IconClock className="w-8 h-8 opacity-80" />
              <span>{formatTime(time)}</span>
            </div>
            <p className="mt-4 text-white/70 text-sm tracking-widest">瑞莎的宇宙早安抽籤機</p>
          </header>

          <main className="relative z-10 flex-grow flex flex-col items-center justify-center px-4 md:px-8 pb-12">
            
            {!currentQuote && !isDrawing && (
              <div className="text-center animate-fade-in-up">
                <h1 className="text-3xl md:text-4xl text-white font-medium tracking-wide mb-8 drop-shadow-md">
                  準備好接收今天的宇宙指引了嗎？
                </h1>
                <button
                  onClick={handleDraw}
                  className="group relative px-8 py-4 bg-white/10 hover:bg-white/20 backdrop-blur-md border border-white/30 rounded-full text-white text-xl font-medium tracking-widest transition-all duration-300 shadow-[0_0_40px_rgba(255,255,255,0.1)] hover:shadow-[0_0_60px_rgba(255,255,255,0.3)] hover:scale-105 flex items-center mx-auto"
                >
                  <IconSparkles className="w-6 h-6 mr-3 text-yellow-300 group-hover:animate-spin-slow" />
                  抽取今日好運
                </button>
              </div>
            )}

            {isDrawing && (
              <div className="text-center text-white flex flex-col items-center">
                <IconSparkles className="w-16 h-16 text-yellow-300 animate-bounce mb-6" />
                <p className="text-xl tracking-widest animate-pulse">宇宙正在為你挑選最適合的頻率...</p>
              </div>
            )}

            {currentQuote && !isDrawing && (
              <div className="w-full max-w-2xl bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl p-8 md:p-10 shadow-2xl animate-fade-in-up">
                <div className="flex items-center justify-center space-x-2 mb-6">
                  {currentQuote.icon}
                  <span className="text-white/90 text-sm tracking-widest bg-white/10 px-4 py-1.5 rounded-full border border-white/10">
                    {currentQuote.category}
                  </span>
                </div>
                
                <div className="text-center mb-10">
                  <p className="text-2xl md:text-3xl text-white font-medium leading-relaxed tracking-wide drop-shadow-sm">
                    「{currentQuote.text}」
                  </p>
                </div>

                <div className="w-full h-px bg-gradient-to-r from-transparent via-white/30 to-transparent mb-8"></div>

                <div className="space-y-4">
                  <h3 className="text-white/90 text-lg font-medium tracking-widest mb-4 flex items-center">
                    <IconSparkles className="w-5 h-5 mr-2 text-yellow-300" />
                    宇宙建議的3個落地微行動：
                  </h3>
                  <ul className="space-y-3">
                    {currentQuote.actions.map((action, index) => (
                      <li key={index} className="flex items-start bg-black/20 rounded-xl p-4 border border-white/5 hover:bg-black/30 transition-colors">
                        <IconCheckCircle2 className="w-5 h-5 text-green-400 mr-3 flex-shrink-0 mt-0.5" />
                        <span className="text-white/90 text-base md:text-lg tracking-wide leading-relaxed">
                          {action}
                        </span>
                      </li>
                    ))}
                  </ul>
                </div>

                <div className="mt-10 flex justify-center">
                  <button
                    onClick={handleDraw}
                    className="flex items-center text-white/70 hover:text-white px-6 py-2 rounded-full border border-white/20 hover:bg-white/10 transition-all duration-300 tracking-wider"
                  >
                    <IconRefreshCw className="w-4 h-4 mr-2" />
                    明天再來抽一次（或偷偷重抽）
                  </button>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    // 將我們的魔法注入到畫面中
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
