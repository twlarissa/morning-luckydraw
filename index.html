<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>瑞莎的宇宙早安抽籤機 ✨</title>
  
  <!-- 引入 Tailwind CSS 魔法，讓畫面變漂亮 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 魔法，讓抽籤機運轉 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 我們專屬的動畫魔法陣 */
    @keyframes fade-in-up {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up {
      animation: fade-in-up 0.8s ease-out forwards;
    }
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .animate-spin-slow {
      animation: spin-slow 3s linear infinite;
    }
  </style>
</head>
<body class="bg-gray-900 m-0 p-0 overflow-x-hidden">
  
  <!-- 這是我們魔法發生的舞台 -->
  <div id="root"></div>

  <!-- 開始撰寫我們的宇宙邏輯 -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- 手工打造的魔法圖示 (SVG) ---
    const IconSparkles = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>);
    const IconClock = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>);
    const IconCalendar = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>);
    const IconCheckCircle2 = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>);
    const IconRefreshCw = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>);
    const IconHeart = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>);
    const IconSun = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>);
    const IconStar = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>);

    // --- 瑞莎精選的宇宙指引資料庫 ---
    const quotesData = [
      {
        id: 1,
        category: '療癒溫柔系',
        text: '清晨的美好如青草般芳香，如河溪般清澈。睜開迷人的雙眼，看白雲片片；舒展美麗的笑臉，聽流水潺潺。',
        background: 'https://images.unsplash.com/photo-1470252649378-9c29740c9fa8?auto=format&fit=crop&q=80&w=2070',
        actions: ['去戶外或陽台深呼吸三次，感受早晨的空氣', '對著鏡子裡的自己，給予一個充滿愛的微笑', '喝一杯溫開水，溫柔地喚醒身體'],
        icon: <IconHeart className="w-6 h-6 text-rose-400" />
      },
      {
        id: 2,
        category: '幽默風趣系',
        text: '輕輕的我來了，悄悄的又走了，忘了帶走一個東西就是「幸福」，所以你要好好為我保存，不然我隨時找你麻煩喔，嘿嘿！',
        background: 'https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?auto=format&fit=crop&q=80&w=2043',
        actions: ['傳一個搞笑的貼圖給好朋友，把快樂傳染出去', '今天給自己找個理由，大笑出聲', '吃一口自己最喜歡的小零食，犒賞自己'],
        icon: <IconSparkles className="w-6 h-6 text-yellow-400" />
      },
      {
        id: 3,
        category: '吸引力法則',
        text: '每天醒來告訴自己：理由少一點，肚量大一點，嘴巴甜一點，脾氣小一點，行動快一點，效率高一點。',
        background: 'https://images.unsplash.com/photo-1493612276216-ee3925520721?auto=format&fit=crop&q=80&w=2000',
        actions: ['寫下今天最感恩的三件小事', '真誠地稱讚今天遇到的第一個人', '放下手機，專注且快速地完成一件日常小任務'],
        icon: <IconSun className="w-6 h-6 text-orange-400" />
      },
      {
        id: 4,
        category: '人生智慧系',
        text: '沒有傘的孩子，必須努力奔跑！你跌跌撞撞落得一身傷，就當是為青春畫下的殘妝。',
        background: 'https://images.unsplash.com/photo-1476820865390-c52aeebb9891?auto=format&fit=crop&q=80&w=2000',
        actions: ['原諒自己昨天犯下的一個小錯誤', '勇敢推進一個一直拖延的計畫，哪怕只做五分鐘', '閱讀一篇短文或聽一段激勵人心的 Podcast'],
        icon: <IconStar className="w-6 h-6 text-indigo-400" />
      },
      {
        id: 5,
        category: '女孩自愛系',
        text: '你可以穿不起香奈兒，但請永遠別忘記一件最重要的衣服，這件衣服叫「自我」。',
        background: 'https://images.unsplash.com/photo-1499914485622-a88fac536970?auto=format&fit=crop&q=80&w=2000',
        actions: ['穿上一件讓你覺得最有自信的衣服', '今天堅定且優雅地拒絕一件你其實不想做的事', '花 10 分鐘好好保養自己的肌膚，對身體說聲謝謝'],
        icon: <IconHeart className="w-6 h-6 text-pink-400" />
      },
      {
        id: 6,
        category: '療癒溫柔系',
        text: '田田田口田田田，推開一扇窗，屋子裡才會充滿光亮；為心靈打開一扇窗，才能體驗更多的鳥語花香。',
        background: 'https://images.unsplash.com/photo-1490682143684-14369e18dce8?auto=format&fit=crop&q=80&w=2000',
        actions: ['打開房間的窗戶，讓陽光與微風進來', '閉上眼睛靜心一分鐘，聆聽周圍的聲音', '整理書桌或工作區的一小角，讓空間流通'],
        icon: <IconHeart className="w-6 h-6 text-teal-400" />
      },
      {
        id: 7,
        category: '幽默風趣系',
        text: '太陽都出來老高，你還在呼呼大睡，我想到一高招，拿根骨頭到，看你會不會向我汪汪叫。',
        background: 'https://images.unsplash.com/photo-1583337130417-3346a1be7dee?auto=format&fit=crop&q=80&w=2000',
        actions: ['伸一個超級大的懶腰，發出舒服的聲音', '放一首輕快活潑的音樂當作起床BGM', '跟身邊的寵物（或布偶）玩耍一分鐘'],
        icon: <IconSparkles className="w-6 h-6 text-yellow-500" />
      }
    ];

    function App() {
      const [currentQuote, setCurrentQuote] = useState(null);
      const [isDrawing, setIsDrawing] = useState(false);
      const [time, setTime] = useState(new Date());

      const defaultBackground = 'https://images.unsplash.com/photo-1534447677768-be436bb09401?auto=format&fit=crop&q=80&w=2000';
      const backgroundUrl = currentQuote ? currentQuote.background : defaultBackground;

      useEffect(() => {
        const timer = setInterval(() => {
          setTime(new Date());
        }, 1000);
        return () => clearInterval(timer);
      }, []);

      const formatDate = (date) => {
        const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
        return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日 ${days[date.getDay()]}`;
      };

      const formatTime = (date) => {
        return date.toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
      };

      const handleDraw = () => {
        if (isDrawing) return;
        setIsDrawing(true);
        setCurrentQuote(null);
        
        setTimeout(() => {
          let nextQuote;
          do {
            const randomIndex = Math.floor(Math.random() * quotesData.length);
            nextQuote = quotesData[randomIndex];
          } while (currentQuote && nextQuote.id === currentQuote.id);
          
          setCurrentQuote(nextQuote);
          setIsDrawing(false);
        }, 1200);
      };

      return (
        <div 
          className="min-h-screen bg-cover bg-center transition-all duration-1000 ease-in-out font-sans flex flex-col relative"
          style={{ backgroundImage: `url(${backgroundUrl})` }}
        >
          <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-[2px]"></div>

          <header className="relative z-10 w-full p-6 flex flex-col items-center justify-center text-white/90">
            <div className="flex items-center space-x-2 text-sm md:text-base font-light tracking-wider mb-2">
              <IconCalendar className="w-4 h-4 opacity-80" />
              <span>{formatDate(time)}</span>
            </div>
            <div className="flex items-center space-x-3 text-4xl md:text-5xl font-semibold tracking-widest drop-shadow-lg">
              <IconClock className="w-8 h-8 opacity-80" />
              <span>{formatTime(time)}</span>
            </div>
            <p className="mt-4 text-white/70 text-sm tracking-widest">瑞莎的宇宙早安抽籤機</p>
          </header>

          <main className="relative z-10 flex-grow flex flex-col items-center justify-center px-4 md:px-8 pb-12">
            
            {!currentQuote && !isDrawing && (
              <div className="text-center animate-fade-in-up">
                <h1 className="text-3xl md:text-4xl text-white font-medium tracking-wide mb-8 drop-shadow-md">
                  準備好接收今天的宇宙指引了嗎？
                </h1>
                <button
                  onClick={handleDraw}
                  className="group relative px-8 py-4 bg-white/10 hover:bg-white/20 backdrop-blur-md border border-white/30 rounded-full text-white text-xl font-medium tracking-widest transition-all duration-300 shadow-[0_0_40px_rgba(255,255,255,0.1)] hover:shadow-[0_0_60px_rgba(255,255,255,0.3)] hover:scale-105 flex items-center mx-auto"
                >
                  <IconSparkles className="w-6 h-6 mr-3 text-yellow-300 group-hover:animate-spin-slow" />
                  抽取今日好運
                </button>
              </div>
            )}

            {isDrawing && (
              <div className="text-center text-white flex flex-col items-center">
                <IconSparkles className="w-16 h-16 text-yellow-300 animate-bounce mb-6" />
                <p className="text-xl tracking-widest animate-pulse">宇宙正在為你挑選最適合的頻率...</p>
              </div>
            )}

            {currentQuote && !isDrawing && (
              <div className="w-full max-w-2xl bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl p-8 md:p-10 shadow-2xl animate-fade-in-up">
                <div className="flex items-center justify-center space-x-2 mb-6">
                  {currentQuote.icon}
                  <span className="text-white/90 text-sm tracking-widest bg-white/10 px-4 py-1.5 rounded-full border border-white/10">
                    {currentQuote.category}
                  </span>
                </div>
                
                <div className="text-center mb-10">
                  <p className="text-2xl md:text-3xl text-white font-medium leading-relaxed tracking-wide drop-shadow-sm">
                    「{currentQuote.text}」
                  </p>
                </div>

                <div className="w-full h-px bg-gradient-to-r from-transparent via-white/30 to-transparent mb-8"></div>

                <div className="space-y-4">
                  <h3 className="text-white/90 text-lg font-medium tracking-widest mb-4 flex items-center">
                    <IconSparkles className="w-5 h-5 mr-2 text-yellow-300" />
                    宇宙建議的3個落地微行動：
                  </h3>
                  <ul className="space-y-3">
                    {currentQuote.actions.map((action, index) => (
                      <li key={index} className="flex items-start bg-black/20 rounded-xl p-4 border border-white/5 hover:bg-black/30 transition-colors">
                        <IconCheckCircle2 className="w-5 h-5 text-green-400 mr-3 flex-shrink-0 mt-0.5" />
                        <span className="text-white/90 text-base md:text-lg tracking-wide leading-relaxed">
                          {action}
                        </span>
                      </li>
                    ))}
                  </ul>
                </div>

                <div className="mt-10 flex justify-center">
                  <button
                    onClick={handleDraw}
                    className="flex items-center text-white/70 hover:text-white px-6 py-2 rounded-full border border-white/20 hover:bg-white/10 transition-all duration-300 tracking-wider"
                  >
                    <IconRefreshCw className="w-4 h-4 mr-2" />
                    明天再來抽一次（或偷偷重抽）
                  </button>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    // 將我們的魔法注入到畫面中
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
